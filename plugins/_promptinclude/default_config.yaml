name_pattern: "*.promptinclude.md"
max_depth: 10
max_file_tokens: 2000
max_file_count: 50
max_total_tokens: 8000
gitignore: |
  venv/**
  **/__pycache__/**
  **/node_modules/**
  **/.npm/**
  **/.git/**
  **/.conda/**
  **/.cache/**
  **/dist/**
  **/build/**
  **/.tox/**
  **/.eggs/**
  **/*.egg-info/**
